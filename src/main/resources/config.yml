# ─────────────────────────────────────────────────────
#  nCore v2.0 — Configuración principal
# ─────────────────────────────────────────────────────

# No tocar — se actualiza sola con /setspawn
spawn:
  world: world
  x: 0.0
  y: 64.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0

# Posiciones de los jugadores al desconectarse (usado por /regresar)
ultimas_posiciones: {}

# ─────────────────────────────────────────────────────
#  Death Chest
# ─────────────────────────────────────────────────────
death-chest:
  # Minutos antes de que el cofre expire y suelte los ítems
  expiry-minutes: 10
